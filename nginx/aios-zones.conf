# Personal AI OS — глобальные настройки nginx
# Назначение: всё, что должно жить на уровне http {} (не внутри server {}).
# Путь на VPS: /etc/nginx/conf.d/aios-zones.conf
#
# SECURITY: не светим версию nginx в заголовках и страницах ошибок.
server_tokens off;

# Rate-limit zones. Хранят счётчики per IP в shared memory (10 МБ ≈ 160k IP).
#   - webhook: для Telegram и Paddle. Telegram retry-доставка возможна, держим выше.
#   - oauth:   для OAuth callbacks. Запросов мало, ужесточаем.
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=oauth:10m   rate=5r/s;

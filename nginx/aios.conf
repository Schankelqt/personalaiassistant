# Personal AI OS — production nginx config
# Назначение: TLS-терминатор перед FastAPI-ботом, слушающим на 127.0.0.1:8000
# Путь на VPS: /etc/nginx/sites-available/personalaios
# Активация:   sudo ln -sf ../sites-available/personalaios /etc/nginx/sites-enabled/personalaios
#              sudo rm -f /etc/nginx/sites-enabled/default
#              sudo nginx -t && sudo systemctl reload nginx
#
# SECURITY-инварианты:
#   - в интернет открыты ТОЛЬКО whitelisted пути (webhook, oauth, health)
#   - всё остальное → 404 (включая /, /static, /admin и т.п.)
#   - HSTS, X-Frame-Options, X-Content-Type-Options, Referrer-Policy на каждый ответ
#   - rate-limit per IP — защита от webhook-флуда
#   - client_max_body_size 2 MiB (Telegram ≤ 1 MiB, Paddle ≤ 512 KiB, запас)

# ──────────────────────────────────────────────────────────────────────────
# HTTP (80): всё редиректим на HTTPS, кроме ACME-challenge для certbot renew
# ──────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name personalaios.ru;

    # certbot renew нужен корневой /.well-known/acme-challenge по HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────────────────
# HTTPS (443): основной сервер
# ──────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name personalaios.ru;

    # TLS — сертификаты от Let's Encrypt, обновляются автоматически
    ssl_certificate     /etc/letsencrypt/live/personalaios.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/personalaios.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # SECURITY headers — добавляются на каждый ответ, в т.ч. 404/5xx (always)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header Referrer-Policy           "no-referrer" always;

    # Body limits
    client_max_body_size    2M;
    client_body_buffer_size 128k;

    # Общие proxy-параметры — DRY через named location не делаем, чтобы
    # каждый прокси-блок был самодостаточен и читался независимо.

    # ───────── Telegram webhook ─────────
    # FastAPI handler: POST /webhook (валидирует X-Telegram-Bot-Api-Secret-Token).
    # burst=20 — Telegram при флуде доставляет апдейты пачками.
    location = /webhook {
        limit_req zone=webhook burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ───────── Paddle billing webhook ─────────
    # FastAPI handler: POST /webhooks/paddle (HMAC-signature, 503 если секрет пуст).
    location = /webhooks/paddle {
        limit_req zone=webhook burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ───────── OAuth callbacks (Google, Jira) ─────────
    # Узкий regex — пускаем только known providers, чтобы не сканировали поддерева.
    location ~ ^/oauth/callback/(google|jira)$ {
        limit_req zone=oauth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ───────── Health checks ─────────
    # /health        — liveness, проверяется UptimeRobot
    # /health/full   — readiness, проверяет postgres+redis (детали в логах, не в ответе)
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
    }
    location = /health/full {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
    }

    # ───────── Всё остальное — 404 ─────────
    # Не отдаём ни статику, ни landing. Защищает от сканеров уязвимостей.
    location / {
        return 404;
    }
}
